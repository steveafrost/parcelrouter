version: '3.8'

services:
  parcel-tracker:
    build: .
    container_name: parcel-tracker
    restart: unless-stopped
    ports:
      - "9001:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - IMAP_HOST=${IMAP_HOST:-imap.mail.me.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - PARCEL_API_KEY=${PARCEL_API_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-5000}
      - POLL_INTERVAL=${POLL_INTERVAL:-3600}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
