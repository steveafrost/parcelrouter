version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      test:
        patterns:
          - "jest"
          - "@types/jest"
          - "ts-jest"
          - "@playwright/*"
          - "supertest"
          - "@types/supertest"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
